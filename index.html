<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href = "style.css" rel = "stylesheet" type = "text/css"/>
    <link href = "utils.css" rel = "stylesheet" type = "text/css"/>
</head>
<body>
    <h1 class="text-center"> hey, come calculate! </h1>
    <div class="container flex flexcol items-center mx-auto m-w-20">
        <div class="row">
             <input class="input" type="text" value="0">
        </div>
        <div class="row">
            <button class="button color2">AC</button>
            <button class="button color2">+/-</button>
            <button class="button color2">%</button>
            <button class="button color1">/</button>

        </div>
         <div class="row">
            <button class="button color3">7</button>
            <button class="button color3">8</button>
            <button class="button color3">9</button>
            <button class="button color1">*</button>

        </div>
         <div class="row">
            <button class="button color3">4</button>
            <button class="button color3">5</button>
            <button class="button color3">6</button>
            <button class="button color1">-</button>

        </div>
         <div class="row">
            <button class="button color3">1</button>
            <button class="button color3">2</button>
            <button class="button color3">3</button>
            <button class="button color1">+</button>

        </div>
         <div class="row">
            <button class="button color3 zero">0</button>
            <button class="button color3 zero">00</button>
            <button class="button color3">.</button>
            <button class="button color1">=</button>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
